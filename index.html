<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cine Mega Player VIP</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #000; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  .player-container { position: relative; width: 100%; height: 100%; background: #000; overflow: hidden; display: flex; align-items: center; }
  video { width: 100%; height: 100%; object-fit: contain; background: #000; z-index: 1; }
  
  /* TELA INICIAL */
  .empty-state { position: absolute; width: 100%; text-align: center; color: white; z-index: 10; display: block; padding: 20px; }
  .empty-state h1 { font-size: 28px; margin: 0 0 10px 0; font-weight: 900; color: #e50914; text-shadow: 0 0 15px rgba(229,9,20,0.5); }
  .empty-state p { font-size: 14px; opacity: 0.7; margin-bottom: 25px; }

  /* BOTÃO DE ESCOLHER ARQUIVO */
  .file-label {
    background: #e50914; color: white; padding: 12px 25px; border-radius: 5px;
    font-weight: bold; cursor: pointer; display: inline-block; transition: 0.3s;
  }
  .file-label:active { transform: scale(0.95); background: #b20710; }
  #fileInput { display: none; }

  /* CONTROLES */
  .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); opacity: 0; transition: 0.3s; pointer-events: none; z-index: 5; }
  .player-container.active:not(.locked) .overlay { opacity: 1; pointer-events: auto; }
  .controls { position: absolute; bottom: 0; width: 100%; padding: 0 20px 15px; opacity: 0; transition: 0.3s; z-index: 20; pointer-events: none; }
  .player-container.active:not(.locked) .controls { opacity: 1; pointer-events: auto; }
  
  .progress-wrapper { position: relative; width: 100%; height: 35px; display: flex; align-items: center; cursor: pointer; }
  .progress-bg { position: absolute; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
  .progress-fill { position: absolute; height: 4px; background: #e50914; width: 0%; }
  .progress-thumb { position: absolute; width: 16px; height: 16px; background: #e50914; border-radius: 50%; transform: translate(-50%, 0) scale(0); left: 0%; transition: 0.1s; }
  .progress-wrapper:hover .progress-thumb { transform: translate(-50%, 0) scale(1); }

  .bottom-row { display: flex; justify-content: space-between; align-items: center; color: white; }
  .btn { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; }
  .btn svg { width: 30px; height: 30px; fill: currentColor; }
  
  .loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #e50914; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; display: none; z-index: 100; }
  @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
  
  .unlock-btn { position: absolute; top: 20px; left: 20px; background: rgba(229,9,20,0.9); border-radius: 50%; width: 45px; height: 45px; display: none; justify-content: center; align-items: center; z-index: 10000; }
  .player-container.locked.show-unlock .unlock-btn { display: flex; }
</style>
</head>
<body>

<div class="player-container paused" id="playerContainer">
  
  <div class="empty-state" id="emptyState">
    <h1>CINE MEGA</h1>
    <p>Escolha um vídeo do seu celular para começar</p>
    <label for="fileInput" class="file-label">📂 SELECIONAR VÍDEO</label>
    <input type="file" id="fileInput" accept="video/*">
  </div>

  <video id="video" playsinline></video>
  <div class="loader" id="loader"></div>
  <div class="overlay" id="overlayBtn"></div>
  
  <button class="unlock-btn" id="unlockBtn"><svg viewBox="0 0 24 24" width="24" fill="white"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h1.9c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10z"/></svg></button>
  
  <div class="controls" id="mainControls" style="display: none;">
    <div class="progress-wrapper" id="progressWrapper"><div class="progress-bg"></div><div class="progress-fill" id="progressFill"></div><div class="progress-thumb" id="progressThumb"></div></div>
    <div class="bottom-row">
      <div class="left">
        <button class="btn" id="playPauseBtn"><svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg><svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg></button>
      </div>
      <div class="time-display" id="timeDisplay" style="color:white; font-size:14px;">00:00 / 00:00</div>
      <button class="btn" id="lockBtn"><svg viewBox="0 0 24 24" width="24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg></button>
    </div>
  </div>
</div>

<script>
const video=document.getElementById('video'),playerContainer=document.getElementById('playerContainer'),playPauseBtn=document.getElementById('playPauseBtn'),iconPlay=document.getElementById('iconPlay'),iconPause=document.getElementById('iconPause'),timeDisplay=document.getElementById('timeDisplay'),progressFill=document.getElementById('progressFill'),progressThumb=document.getElementById('progressThumb'),progressWrapper=document.getElementById('progressWrapper'),emptyState=document.getElementById('emptyState'),fileInput=document.getElementById('fileInput'),mainControls=document.getElementById('mainControls'),unlockBtn=document.getElementById('unlockBtn'),lockBtn=document.getElementById('lockBtn');

// LÓGICA DE ABRIR ARQUIVO LOCAL
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    startPlayer(url);
  }
};

function startPlayer(url) {
  emptyState.style.display = 'none';
  mainControls.style.display = 'block';
  video.src = url;
  video.play();
  playerContainer.classList.add('active');
  playerContainer.classList.remove('paused');
  iconPlay.style.display='none'; iconPause.style.display='block';
}

function formatTime(s){ if(isNaN(s))return"00:00"; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60); return h>0?`${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`:`${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`}

video.ontimeupdate=()=>{
  const pos=video.currentTime/video.duration;
  progressFill.style.width=`${pos*100}%`;
  progressThumb.style.left=`${pos*100}%`;
  timeDisplay.innerText=`${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
};

playPauseBtn.onclick=()=>{
  if(video.paused){video.play(); iconPlay.style.display='none'; iconPause.style.display='block';}
  else{video.pause(); iconPlay.style.display='block'; iconPause.style.display='none';}
};

// PROGRESSO
progressWrapper.onclick=(e)=>{
  const rect=progressWrapper.getBoundingClientRect();
  const pos=(e.clientX-rect.left)/rect.width;
  video.currentTime=pos*video.duration;
};

// CADEADO
lockBtn.onclick=(e)=>{e.stopPropagation(); playerContainer.classList.add('locked'); playerContainer.classList.remove('active');};
unlockBtn.onclick=(e)=>{e.stopPropagation(); playerContainer.classList.remove('locked'); resetControls();};
playerContainer.onclick=()=>{ if(playerContainer.classList.contains('locked')){ playerContainer.classList.add('show-unlock'); setTimeout(()=>playerContainer.classList.remove('show-unlock'),3000); } else { resetControls(); } };

let hTimer;
function resetControls(){ playerContainer.classList.add('active'); clearTimeout(hTimer); if(!video.paused) hTimer=setTimeout(()=>playerContainer.classList.remove('active'),3000); }
video.onplay=resetControls;
</script>
</body>
</html>
