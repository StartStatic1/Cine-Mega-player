<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cine Mega Player v1.0</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    margin: 0; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
  }

  .player-container {
    position: relative; width: 100%; height: 100%; max-width: 100%; background: #000;
    overflow: hidden; display: flex; align-items: center;
  }

  video { width: 100%; height: 100%; object-fit: contain; }

  /* SOMBRAS E OVERLAYS */
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.5) 100%);
    opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 5;
  }
  .player-container.active:not(.locked) .overlay { opacity: 1; pointer-events: auto; }

  /* ÁREAS DE CLIQUE (TOQUE DUPLO) */
  .tap-area { position: absolute; top: 0; bottom: 80px; width: 30%; z-index: 10; pointer-events: none; }
  .player-container.active:not(.locked) .tap-area { pointer-events: auto; }
  .tap-left { left: 0; }
  .tap-right { right: 0; }

  .tap-feedback {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.6); color: #fff; padding: 15px 20px;
    border-radius: 50px; font-weight: bold; font-size: 14px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 25;
  }
  .feedback-left { left: 15%; }
  .feedback-right { right: 15%; }
  .tap-feedback.show { opacity: 1; }

  /* CONTROLES CENTRAIS */
  .center-play {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.5); border-radius: 50%; width: 70px; height: 70px;
    display: flex; justify-content: center; align-items: center; cursor: pointer;
    opacity: 0; transition: opacity 0.2s; z-index: 15; border: 2px solid rgba(255,255,255,0.1);
    pointer-events: none;
  }
  .player-container.paused.active:not(.locked) .center-play { opacity: 1; pointer-events: auto; }

  /* CONTROLES INFERIORES */
  .controls {
    position: absolute; bottom: 0; width: 100%; padding: 0 20px 15px;
    opacity: 0; transition: opacity 0.3s, transform 0.3s; transform: translateY(10px); z-index: 20;
    pointer-events: none;
  }
  .player-container.active:not(.locked) .controls { opacity: 1; transform: translateY(0); pointer-events: auto; }

  /* BARRA DE PROGRESSO (ESTILO NETFLIX/EXO) */
  .progress-wrapper {
    position: relative; width: 100%; height: 35px; display: flex; align-items: center; cursor: pointer;
  }
  .progress-bg { position: absolute; width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
  .progress-fill { position: absolute; height: 4px; background: #e50914; border-radius: 2px; width: 0%; pointer-events: none; }
  .progress-thumb {
    position: absolute; width: 16px; height: 16px; background: #e50914; border-radius: 50%;
    transform: translate(-50%, 0) scale(0); transition: transform 0.1s; left: 0%; pointer-events: none;
  }
  .progress-wrapper:hover .progress-thumb, .is-dragging .progress-thumb { transform: translate(-50%, 0) scale(1); }

  .bottom-row { display: flex; justify-content: space-between; align-items: center; color: white; margin-top: -5px; }
  .left-btns, .right-btns { display: flex; align-items: center; gap: 20px; }
  
  .btn { background: none; border: none; color: white; cursor: pointer; padding: 5px; display: flex; align-items: center; }
  .btn svg { width: 28px; height: 28px; fill: currentColor; }
  .time-display { font-size: 14px; font-weight: 500; opacity: 0.9; user-select: none; }

  /* MENU DE VELOCIDADE */
  .settings-menu {
    position: absolute; bottom: 70px; right: 20px; background: rgba(15,15,15,0.98);
    border-radius: 12px; padding: 8px 0; display: none; flex-direction: column; z-index: 100;
    min-width: 150px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .settings-menu.open { display: flex; }
  .settings-item {
    color: white; padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; background: none; text-align: left;
  }
  .settings-item:hover, .settings-item.active { background: #e50914; }

  /* SISTEMA DE CADEADO MINIMALISTA */
  .top-controls { position: absolute; top: 20px; right: 20px; z-index: 30; opacity: 0; transition: 0.3s; pointer-events: none; }
  .player-container.active:not(.locked) .top-controls { opacity: 1; pointer-events: auto; }
  
  .unlock-btn {
    position: absolute; top: 20px; left: 20px; background: rgba(229,9,20,0.9);
    border-radius: 50%; width: 45px; height: 45px; display: none; justify-content: center;
    align-items: center; cursor: pointer; z-index: 10000; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  }
  .player-container.locked.show-unlock .unlock-btn { display: flex; }

  /* CARREGAMENTO */
  .loader {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #e50914;
    border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
    display: none; z-index: 100;
  }
  .player-container.loading .loader { display: block; }
  @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
</style>
</head>
<body>

<div class="player-container paused active" id="playerContainer">
  <video id="video" playsinline></video>
  
  <div class="loader"></div>
  <div class="overlay" id="overlayBtn"></div>

  <div class="top-controls">
    <button class="btn" id="lockBtn"><svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg></button>
  </div>

  <button class="unlock-btn" id="unlockBtn">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h1.9c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm0 12H6V10h12v10z"/></svg>
  </button>

  <div class="tap-area tap-left" id="tapLeft"></div>
  <div class="tap-area tap-right" id="tapRight"></div>

  <div class="tap-feedback feedback-left" id="fbLeft">⏪ 10s</div>
  <div class="tap-feedback feedback-right" id="fbRight">10s ⏩</div>

  <div class="center-play" id="centerPlay"><svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div>

  <div class="settings-menu" id="speedMenu">
    <button class="settings-item" data-speed="0.5">0.5x Lento</button>
    <button class="settings-item active" data-speed="1.0">1.0x Normal</button>
    <button class="settings-item" data-speed="1.5">1.5x Rápido</button>
    <button class="settings-item" data-speed="2.0">2.0x Velocidade</button>
  </div>

  <div class="controls">
    <div class="progress-wrapper" id="progressWrapper">
      <div class="progress-bg"></div>
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>

    <div class="bottom-row">
      <div class="left-btns">
        <button class="btn" id="playPauseBtn">
          <svg id="iconPlay" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="iconPause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
      </div>
      <div class="right-btns">
        <button class="btn" id="settingsBtn"><svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 C10.14,21.59,10.34,21.76,10.58,21.76h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg></button>
        <button class="btn" id="fullscreenBtn"><svg id="iconFull" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg><svg id="iconExitFull" viewBox="0 0 24 24" style="display:none;"><path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/></svg></button>
      </div>
    </div>
  </div>
</div>

<script>
const video = document.getElementById('video');
const playerContainer = document.getElementById('playerContainer');
const playPauseBtn = document.getElementById('playPauseBtn');
const iconPlay = document.getElementById('iconPlay');
const iconPause = document.getElementById('iconPause');
const centerPlay = document.getElementById('centerPlay');
const timeDisplay = document.getElementById('timeDisplay');
const progressWrapper = document.getElementById('progressWrapper');
const progressFill = document.getElementById('progressFill');
const progressThumb = document.getElementById('progressThumb');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const iconFull = document.getElementById('iconFull');
const iconExitFull = document.getElementById('iconExitFull');
const overlayBtn = document.getElementById('overlayBtn');
const lockBtn = document.getElementById('lockBtn');
const unlockBtn = document.getElementById('unlockBtn');
const settingsBtn = document.getElementById('settingsBtn');
const speedMenu = document.getElementById('speedMenu');

// ==========================================
// 🚀 LÓGICA DE CAPTURA DE LINK DINÂMICO
// ==========================================
const urlParams = new URLSearchParams(window.location.search);
// Prioridade: Link da URL ?video=... | Segundo: Fallback Teste
const src = urlParams.get('video') || "https://ia801407.us.archive.org/33/items/brinquedo-assassino-1988/Brinquedo%20Assassino%201%20%281988%29%20BDrip%20720p%20Dublado%20dat2014.mp4";

if (Hls.isSupported() && (src.includes('.m3u8') || src.includes('.ts'))) {
  const hls = new Hls(); hls.loadSource(src); hls.attachMedia(video);
} else { video.src = src; }

function formatTime(s) {
  if (isNaN(s)) return "00:00";
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
  return h > 0 ? `${h}:${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}` : `${m.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;
}

function togglePlay() {
  if(playerContainer.classList.contains('locked')) return;
  if (video.paused) { video.play(); playerContainer.classList.remove('paused'); iconPlay.style.display='none'; iconPause.style.display='block'; }
  else { video.pause(); playerContainer.classList.add('paused'); iconPlay.style.display='block'; iconPause.style.display='none'; }
}
playPauseBtn.onclick = togglePlay; centerPlay.onclick = togglePlay;

fullscreenBtn.onclick = () => {
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
    else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
    else if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
    iconFull.style.display='none'; iconExitFull.style.display='block';
  } else {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    iconFull.style.display='block'; iconExitFull.style.display='none';
  }
};

// ARRASTE EM TEMPO REAL (SCRUBBING)
let isDragging = false, wasPaused = false, dragPos = 0;

function calculatePos(e) {
  const rect = progressWrapper.getBoundingClientRect();
  const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : (e.changedTouches ? e.changedTouches[0].clientX : e.clientX);
  return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
}

video.addEventListener('timeupdate', () => {
  if (isDragging) return;
  const dur = video.duration || 0;
  if(dur > 0) {
    const pos = video.currentTime / dur;
    progressFill.style.width = `${pos*100}%`;
    progressThumb.style.left = `${pos*100}%`;
    timeDisplay.innerText = `${formatTime(video.currentTime)} / ${formatTime(dur)}`;
    localStorage.setItem("cp_" + src, video.currentTime);
  }
});

const startDrag = (e) => {
  if(playerContainer.classList.contains('locked')) return;
  isDragging = true; progressWrapper.classList.add('is-dragging'); wasPaused = video.paused; video.pause();
  dragPos = calculatePos(e); updateVisuals(dragPos);
};
const moveDrag = (e) => { if(!isDragging) return; e.preventDefault(); dragPos = calculatePos(e); updateVisuals(dragPos); };
const endDrag = (e) => {
  if(!isDragging) return;
  isDragging = false; progressWrapper.classList.remove('is-dragging');
  video.currentTime = dragPos * video.duration;
  if(!wasPaused) video.play();
};

function updateVisuals(pos) {
  progressFill.style.width = `${pos*100}%`;
  progressThumb.style.left = `${pos*100}%`;
  timeDisplay.innerText = `${formatTime(pos * video.duration)} / ${formatTime(video.duration)}`;
}

progressWrapper.addEventListener('mousedown', startDrag);
window.addEventListener('mousemove', moveDrag);
window.addEventListener('mouseup', endDrag);
progressWrapper.addEventListener('touchstart', startDrag, {passive: false});
progressWrapper.addEventListener('touchmove', moveDrag, {passive: false});
progressWrapper.addEventListener('touchend', endDrag);

video.addEventListener('loadedmetadata', () => {
  const saved = localStorage.getItem("cp_" + src);
  if (saved) video.currentTime = parseFloat(saved);
});

video.addEventListener('waiting', () => playerContainer.classList.add('loading'));
video.addEventListener('playing', () => playerContainer.classList.remove('loading'));

// DOUBLE TAP
let lastLT = 0, lastRT = 0;
document.getElementById('tapLeft').onclick = () => {
  if(playerContainer.classList.contains('locked')) return;
  const now = Date.now(); if(now-lastLT < 300) { video.currentTime -= 10; showFB('fbLeft'); } lastLT = now;
};
document.getElementById('tapRight').onclick = () => {
  if(playerContainer.classList.contains('locked')) return;
  const now = Date.now(); if(now-lastRT < 300) { video.currentTime += 10; showFB('fbRight'); } lastRT = now;
};
function showFB(id) { document.getElementById(id).classList.add('show'); setTimeout(()=>document.getElementById(id).classList.remove('show'),400); }

// SETTINGS & LOCK
settingsBtn.onclick = (e) => { e.stopPropagation(); speedMenu.classList.toggle('open'); };
document.querySelectorAll('.settings-item').forEach(i => {
  i.onclick = (e) => {
    e.stopPropagation(); document.querySelectorAll('.settings-item').forEach(x => x.classList.remove('active'));
    i.classList.add('active'); video.playbackRate = parseFloat(i.dataset.speed); speedMenu.classList.remove('open');
  };
});

let unlockTimer;
lockBtn.onclick = (e) => { e.stopPropagation(); playerContainer.classList.add('locked'); playerContainer.classList.remove('active'); };
playerContainer.onclick = () => {
  if(playerContainer.classList.contains('locked')) {
    playerContainer.classList.add('show-unlock'); clearTimeout(unlockTimer);
    unlockTimer = setTimeout(()=>playerContainer.classList.remove('show-unlock'),3000);
  } else { resetControls(); }
};
unlockBtn.onclick = (e) => { e.stopPropagation(); playerContainer.classList.remove('locked'); playerContainer.classList.remove('show-unlock'); resetControls(); };

let hTimer;
function resetControls() {
  if(playerContainer.classList.contains('locked')) return;
  playerContainer.classList.add('active'); speedMenu.classList.remove('open');
  clearTimeout(hTimer); if(!video.paused) hTimer = setTimeout(()=> { playerContainer.classList.remove('active'); speedMenu.classList.remove('open'); }, 3000);
}
video.onmousemove = resetControls; video.ontouchstart = resetControls; video.onplay = resetControls;
</script>
</body>
</html>
